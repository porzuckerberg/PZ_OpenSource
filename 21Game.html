<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Game - Gemini Edition</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Google_Gemini_icon_2025.svg/1280px-Google_Gemini_icon_2025.svg.png?_=20250728014952">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --container-bg: #1a1d28;
            --inner-bg: #11131c;
            --p1-color: #3cffbb;
            --p2-color: #ff6bbd;
            --text-color: #ffffff;
            --border-val: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top left, #1e2230 0%, #0f111a 100%);
            font-family: 'Silkscreen', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
            overflow: hidden;
        }

        .main-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 40px;
            width: 90vw;
            max-width: 1200px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: var(--border-val);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .top-bar {
            background-color: var(--inner-bg);
            border-radius: 40px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border: var(--border-val);
        }

        .mode-badge {
            background: #08090d;
            border-radius: 50px;
            display: flex;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.3s;
        }
        .mode-badge:hover { transform: scale(1.02); border-color: var(--p1-color); }

        .mode-p1 { background: var(--p1-color); padding: 15px 30px; color: #000; font-size: 2.2rem; min-width: 60px; text-align: center; font-weight: 400; }
        .mode-text { padding: 0 40px; color: var(--p1-color); font-size: 1.8rem; align-self: center; letter-spacing: 2px; }
        .mode-p2 { background: var(--p2-color); padding: 15px 30px; color: #000; font-size: 2.2rem; min-width: 60px; text-align: center; font-weight: 400; }

        .number-track {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .num-dot {
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.03);
            color: #4a5061;
            border: var(--border-val);
            transition: 0.3s;
        }
        .num-p1 { background: var(--p1-color); color: #000; box-shadow: 0 0 15px rgba(60, 255, 187, 0.4); border-color: transparent; }
        .num-p2 { background: var(--p2-color); color: #000; box-shadow: 0 0 15px rgba(255, 107, 189, 0.4); border-color: transparent; }

        .play-area { display: flex; gap: 20px; flex-grow: 1; }

        .player-box {
            flex: 1;
            background-color: var(--inner-bg);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 3px solid transparent;
            transition: 0.3s;
        }
        
        .active-p1 { border-color: var(--p1-color); box-shadow: inset 0 0 20px rgba(60, 255, 187, 0.1); }
        .active-p2 { border-color: var(--p2-color); box-shadow: inset 0 0 20px rgba(255, 107, 189, 0.1); }
        .disabled { opacity: 0.15; pointer-events: none; filter: grayscale(1); }

        .move-btn {
            background-color: transparent;
            color: var(--p1-color);
            border: 1px solid var(--p1-color);
            padding: 15px;
            border-radius: 15px;
            font-family: 'Silkscreen';
            cursor: pointer;
            width: 80%;
            max-width: 280px;
            transition: 0.2s;
            font-size: 1.1rem;
        }
        .p2-btn { color: var(--p2-color); border-color: var(--p2-color); }
        .move-btn:hover:not(:disabled) { background: var(--p1-color); color: #000; box-shadow: 0 0 20px rgba(60, 255, 187, 0.3); }
        .p2-btn:hover:not(:disabled) { background: var(--p2-color); color: #000; box-shadow: 0 0 20px rgba(255, 107, 189, 0.3); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 9, 13, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border-radius: 40px;
        }

        .menu-card {
            background: var(--inner-bg);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .menu-card h2 {
            font-weight: 400; 
            margin-top: 0;
            letter-spacing: 3px;
            font-size: 2rem;
        }

        .menu-btn {
            padding: 18px;
            font-family: 'Silkscreen';
            background: rgba(255,255,255,0.02);
            color: #888e9b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        .menu-btn:hover { background: white; color: black; transform: translateY(-3px); }
        .btn-pvp { border-color: var(--p1-color); color: var(--p1-color); }

        .reset-btn {
            margin-top: 25px;
            padding: 15px 50px;
            font-family: 'Silkscreen';
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3rem;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-winner-p1 {
            background: var(--p1-color);
            box-shadow: 0 6px 0 #28ad7f, 0 10px 20px rgba(60, 255, 187, 0.2);
        }
        .btn-winner-p1:hover {
            background: #5effc9;
            box-shadow: 0 10px 0 #28ad7f, 0 20px 30px rgba(60, 255, 187, 0.4);
            transform: translateY(-4px) scale(1.05);
        }
        .btn-winner-p1:active {
            background: #32d69d;
            box-shadow: 0 2px 0 #28ad7f;
            transform: translateY(2px) scale(0.98);
        }

        .btn-winner-p2 {
            background: var(--p2-color);
            box-shadow: 0 6px 0 #d14d93, 0 10px 20px rgba(255, 107, 189, 0.2);
        }
        .btn-winner-p2:hover {
            background: #ff85c9;
            box-shadow: 0 10px 0 #d14d93, 0 20px 30px rgba(255, 107, 189, 0.4);
            transform: translateY(-4px) scale(1.05);
        }
        .btn-winner-p2:active {
            background: #e65fa8;
            box-shadow: 0 2px 0 #d14d93;
            transform: translateY(2px) scale(0.98);
        }

        .winner-overlay { display: none; }
        .winner-overlay .menu-card {
            background: rgba(17, 19, 28, 0.8);
            backdrop-filter: blur(10px);
            border-width: 2px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="mode-menu" class="overlay">
        <div class="menu-card">
            <h2>SELECT MODE</h2>
            <button class="menu-btn" onclick="setMode('EASY')">PVE EASY</button>
            <button class="menu-btn" onclick="setMode('NORMAL')">PVE NORMAL</button>
            <button class="menu-btn" onclick="setMode('HARD')">PVE HARD</button>
            <button class="menu-btn btn-pvp" onclick="setMode('PVP')">PVP MODE</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="mode-badge" onclick="showMenu()">
            <div class="mode-p1" id="p1-score">0</div>
            <div class="mode-text" id="display-mode">PVP MODE</div>
            <div class="mode-p2" id="p2-score">0</div>
        </div>
        <div class="number-track" id="track"></div>
    </div>

    <div class="play-area">
        <div class="player-box active-p1" id="box-1">
            <div style="color:var(--p1-color); font-size: 1.5rem;">PLAYER 1</div>
            <button class="move-btn" onclick="play(1)" id="p1-b1">-</button>
            <button class="move-btn" onclick="play(2)" id="p1-b2">-</button>
            <button class="move-btn" onclick="play(3)" id="p1-b3">-</button>
        </div>

        <div class="player-box disabled" id="box-2">
            <div style="color:var(--p2-color); font-size: 1.5rem;" id="p2-label">PLAYER 2</div>
            <button class="move-btn p2-btn" onclick="play(1)" id="p2-b1">-</button>
            <button class="move-btn p2-btn" onclick="play(2)" id="p2-b2">-</button>
            <button class="move-btn p2-btn" onclick="play(3)" id="p2-b3">-</button>
        </div>
    </div>

    <div class="overlay winner-overlay" id="winner-ui">
        <div class="menu-card" id="winner-card">
            <h2 id="winner-message">PLAYER 1 WINS!</h2>
            <button class="reset-btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    let currentNum = 0;
    let turn = 1;
    let firstTurn = 1;
    let isGameOver = false;
    let p1Score = 0;
    let p2Score = 0;
    let gameMode = 'PVP';

    function init() {
        document.getElementById('p1-score').innerText = p1Score;
        document.getElementById('p2-score').innerText = p2Score;
        const track = document.getElementById('track');
        track.innerHTML = '';
        for (let i = 1; i <= 21; i++) {
            const div = document.createElement('div');
            div.className = 'num-dot';
            div.id = `n-${i}`;
            div.innerText = i;
            track.appendChild(div);
        }
        updateUI();

        if (gameMode !== 'PVP' && turn === 2 && !isGameOver) {
            setTimeout(botMove, 800);
        }
    }

    function showMenu() {
        document.getElementById('mode-menu').style.display = 'flex';
    }

    function setMode(mode) {
        gameMode = mode;
        p1Score = 0;
        p2Score = 0;
        firstTurn = 1;
        document.getElementById('display-mode').innerText = mode === 'PVP' ? 'PVP MODE' : 'PVE ' + mode;
        document.getElementById('p2-label').innerText = mode === 'PVP' ? 'PLAYER 2' : 'BOT (' + mode + ')';
        document.getElementById('mode-menu').style.display = 'none';
        resetGame(true);
    }

    function updateUI() {
        for (let p = 1; p <= 2; p++) {
            for (let i = 1; i <= 3; i++) {
                let btn = document.getElementById(`p${p}-b${i}`);
                let label = "";
                for(let j=1; j<=i; j++) {
                    if(currentNum + j <= 21) label += (currentNum + j) + " ";
                }
                btn.innerText = label.trim() || "---";
                btn.disabled = (currentNum + 1 > 21) || (gameMode !== 'PVP' && turn === 2);
            }
        }
    }

    function play(count) {
        if (isGameOver) return;
        
        for (let i = 0; i < count; i++) {
            currentNum++;
            if (currentNum <= 21) {
                document.getElementById(`n-${currentNum}`).classList.add(turn === 1 ? 'num-p1' : 'num-p2');
            }
            if (currentNum >= 21) {
                endGame();
                return;
            }
        }

        turn = turn === 1 ? 2 : 1;
        updateTurnDisplay();
        updateUI();

        if (gameMode !== 'PVP' && turn === 2 && !isGameOver) {
            setTimeout(botMove, 800);
        }
    }

    function botMove() {
        let count = 1;
        const targets = [4, 8, 12, 16, 20];
        
        if (gameMode === 'HARD') {
            let found = false;
            for (let i = 1; i <= 3; i++) {
                if (targets.includes(currentNum + i)) { count = i; found = true; break; }
            }
            if (!found) count = Math.floor(Math.random() * 3) + 1;
        } 
        else if (gameMode === 'NORMAL') {
            if (Math.random() > 0.6) {
                for (let i = 1; i <= 3; i++) {
                    if (targets.includes(currentNum + i)) { count = i; break; }
                }
            } else {
                count = Math.floor(Math.random() * 3) + 1;
            }
        } 
        else if (gameMode === 'EASY') {
            let safeMoves = [];
            for (let i = 1; i <= 3; i++) {
                if (!targets.includes(currentNum + i)) safeMoves.push(i);
            }
            count = safeMoves.length > 0 ? safeMoves[Math.floor(Math.random() * safeMoves.length)] : 1;
        }

        if (currentNum + count > 21) count = 21 - currentNum;
        if (count < 1) count = 1;
        play(count);
    }

    function updateTurnDisplay() {
        document.getElementById('box-1').classList.toggle('active-p1', turn === 1);
        document.getElementById('box-1').classList.toggle('disabled', turn === 2);
        document.getElementById('box-2').classList.toggle('active-p2', turn === 2);
        document.getElementById('box-2').classList.toggle('disabled', turn === 1);
    }

    function endGame() {
        isGameOver = true;
        const winner = turn === 1 ? 2 : 1;
        
        if(winner === 1) {
            p1Score++;
        } else {
            p2Score++;
        }
        
        document.getElementById('p1-score').innerText = p1Score;
        document.getElementById('p2-score').innerText = p2Score;
        
        const ui = document.getElementById('winner-ui');
        const card = document.getElementById('winner-card');
        const resetBtn = ui.querySelector('.reset-btn');
        
        ui.style.display = 'flex';
        
        card.style.borderColor = winner === 1 ? 'var(--p1-color)' : 'var(--p2-color)';
        
        resetBtn.classList.remove('btn-winner-p1', 'btn-winner-p2'); 
        if (winner === 1) {
            resetBtn.classList.add('btn-winner-p1');
        } else {
            resetBtn.classList.add('btn-winner-p2');
        }
        
        const winMsg = (gameMode !== 'PVP' && winner === 2) ? "BOT WINS!" : `PLAYER ${winner} WINS!`;
        document.getElementById('winner-message').innerText = winMsg;
    }

    function resetGame(forceFirst = false) {
        currentNum = 0;
        isGameOver = false;
        if (!forceFirst) firstTurn = firstTurn === 1 ? 2 : 1;
        else firstTurn = 1;
        turn = firstTurn;
        
        document.getElementById('winner-ui').style.display = 'none';
        
        init();
        updateTurnDisplay();
    }

    init();
</script>

</body>
</html>
