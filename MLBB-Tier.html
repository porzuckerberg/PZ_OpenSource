<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Tier List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="https://i.postimg.cc/Pq8yPxsT/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0d0e14; --container-bg: #1a1c26; --row-bg: #111218; --accent-green: #00ffcc; --border-color: #2d303e; --common-radius: 35px; }
        body { background-color: var(--bg-color); font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: #fff; margin: 0; }
        .main-wrapper { background-color: var(--container-bg); border: 1px solid var(--border-color); border-radius: var(--common-radius); padding: 30px; width: 98%; max-width: 1500px; margin-bottom: 30px; transition: box-shadow 0.3s ease; }
        .main-wrapper:hover { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); }
        .tier-row { display: flex; background-color: var(--row-bg); margin-bottom: 15px; min-height: 100px; border-radius: var(--common-radius); padding: 10px 25px 10px 10px; align-items: stretch; border: 1px solid var(--border-color); transition: border-color 0.3s ease, background-color 0.3s ease; cursor: grab; }
        .tier-row:hover { border-color: #4e5264; background-color: #161821; }
        .tier-row.dragging-row { opacity: 0.4; border: 2px dashed var(--accent-green); }
        .tier-label { width: 40px; min-height: 80px; height: auto; align-self: stretch; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); margin-right: 15px; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; flex-shrink: 0; text-transform: uppercase; box-shadow: 0 0 15px var(--label-shadow, rgba(0,0,0,0.2)); }
        .tier-label:hover { transform: rotate(180deg) scale(1.1); filter: brightness(1.1); box-shadow: 0 0 25px var(--label-shadow, rgba(0,0,0,0.4)); z-index: 5; }
        .tier-row { position: relative; }
        .delete-row-btn { position: absolute; top: -5px; right: -5px; width: 24px; height: 24px; background-color: #ff3b30; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 100; }
        .tier-row:hover .delete-row-btn { opacity: 1; }
        .delete-row-btn:hover { transform: scale(1.1); background-color: #ff453a; }
        .sss { background-color: var(--accent-green); box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        .a { background-color: #ff3366; color: #fff; box-shadow: 0 0 15px rgba(255, 51, 102, 0.3); }
        .drop-zone { display: flex; flex-wrap: wrap; gap: 12px; flex-grow: 1; min-height: 90px; align-items: center; }
        #pool-zone { height: 460px; overflow-y: auto; align-content: flex-start; padding-left: 20px; padding-right: 20px; padding-top: 15px; }
        #pool-zone::-webkit-scrollbar { width: 8px; }
        #pool-zone::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        #pool-zone::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        #pool-zone::-webkit-scrollbar-thumb:hover { background: var(--accent-green); }
        .hero-card { width: 75px; height: 100px; background-color: #252836; border-radius: 12px; position: relative; cursor: grab; overflow: hidden; border: 1px solid var(--border-color); user-select: none; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s ease, box-shadow 0.2s ease; }
        .hero-card:hover { transform: translateY(-8px) scale(1.08); border-color: var(--accent-green); box-shadow: 0 8px 20px rgba(0, 255, 204, 0.4); z-index: 10; }
        .hero-card.dragging { opacity: 0.2; transform: scale(0.8); }
        .hero-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; transition: filter 0.3s ease; }
        .hero-card:hover img { filter: brightness(1.1); }
        .hero-name { position: absolute; bottom: 0; width: 100%; background: rgba(13, 14, 20, 0.85); color: #eee; font-size: 11px; text-align: center; padding: 3px 0; font-weight: 600; pointer-events: none; transition: background 0.3s ease, color 0.3s ease; }
        .hero-card:hover .hero-name { background: rgba(0, 255, 204, 0.9); color: #000; }
        .filter-container { display: flex; justify-content: center; gap: 2px; margin-bottom: 25px; flex-wrap: wrap; background-color: rgba(0, 255, 204, 0.03); padding: 4px; border-radius: 20px; width: fit-content; margin-left: auto; margin-right: auto; border: 1px solid rgba(0, 255, 204, 0.1); }
        .filter-tab { background-color: transparent; color: #8a8d9b; padding: 10px 35px; min-width: 110px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; border: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'Rajdhani', sans-serif; }
        .filter-tab:hover { color: var(--accent-green); background-color: rgba(0, 255, 204, 0.08); }
        .filter-tab.active { color: #000; background-color: var(--accent-green); box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
        .add-row-btn { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px dashed var(--border-color); padding: 12px; border-radius: var(--common-radius); cursor: pointer; font-size: 1.5rem; color: #4e5264; margin-top: 10px; transition: all 0.3s ease; }
        .add-row-btn:hover { color: var(--accent-green); border: 1px dashed var(--accent-green); background: rgba(0, 255, 204, 0.05); box-shadow: 0 0 15px rgba(0, 255, 204, 0.1); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 2000; animation: fadeIn 0.15s ease-out; }
        .edit-modal { background: var(--container-bg); width: auto; min-width: 680px; border-radius: 45px; padding: 15px 15px 25px 15px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px var(--border-color); animation: modalPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-main-content { background: var(--row-bg); border-radius: 35px; padding: 20px; display: flex; gap: 35px; justify-content: center; align-items: center; border: 1px solid var(--border-color); }
        .preview-box { background: var(--bg-color); width: 300px; height: 170px; border-radius: 30px; position: relative; overflow: hidden; display: flex; justify-content: center; box-shadow: inset 0 5px 15px rgba(0,0,0,0.5); }
        .preview-inner-stroke { background: #14151c; width: 170px; height: 200px; border: 3px solid var(--border-color); border-radius: 40px; position: absolute; top: 25px; display: flex; justify-content: center; padding-top: 25px; transition: border-color 0.15s ease; }
        .preview-inner-stroke:hover { border-color: var(--accent-green); }
        .preview-label { width: 130px; height: 45px; border-radius: 25px; border: none; outline: none; font-weight: 700; font-size: 1.4rem; color: #000; text-align: center; cursor: text; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; }
        .preview-label:hover, .preview-label:focus { transform: scale(1.05); }
        .color-palette-container { display: flex; flex-direction: column; gap: 15px; }
        .color-row { display: flex; gap: 12px; background: var(--bg-color); padding: 10px 18px; border-radius: 35px; border: 1px solid var(--border-color); }
        .color-circle { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease; }
        .color-circle:hover { transform: scale(1.2); }
        .color-circle.selected { border-color: #fff; transform: scale(1.1); }
        .modal-footer { display: flex; gap: 20px; padding: 25px 15px 0px 15px; }
        .modal-btn { flex: 1; height: 50px; border-radius: 25px; border: none; font-weight: 700; cursor: pointer; font-size: 1.3rem; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease, background 0.15s ease; font-family: 'Rajdhani', sans-serif; }
        .btn-confirm { background: var(--accent-green); color: #000; }
        .btn-confirm:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 255, 204, 0.3); }
        .btn-cancel { background: #2d303e; color: #fff; }
        .btn-cancel:hover { background: #3a3e52; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalPop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .site-footer { margin-top: 60px; padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-color); width: 100%; }
        .footer-content p { color: #666; font-size: 14px; letter-spacing: 2px; margin: 5px 0; }
        .footer-content .highlight { color: var(--accent-green); font-weight: bold; }
        .sub-credit { font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="main-wrapper" id="tier-list-container">
        <!--div class="tier-row">
            <div class="tier-label sss">SSS</div>
            <div class="drop-zone"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label a">F</div>
            <div class="drop-zone"></div>
        </div-->
        <button class="add-row-btn">+</button>
    </div>
    <div class="main-wrapper">
        <div class="filter-container" id="filter-bar"></div>
        <div class="drop-zone" id="pool-zone"></div>
    </div>
    <footer class="site-footer">
        <div class="footer-content">
            <p>© 2026 <span class="highlight">PZ Dev</span>. ALL RIGHTS RESERVED.</p>
            <p class="sub-credit">MOBILE LEGENDS: BANG BANG IS A REGISTERED TRADEMARK OF MOONTON GAMES.</p>
        </div>
    </footer>



    <script src="MLBB Hero.js"></script>
    <script>
        const colorPaletteRows = [['#d1d1d1', '#00ffcc', '#00e5ff', '#b4a2ff', '#ff96ad', '#ffff00'], ['#666666', '#33ff00', '#007bff', '#6f42c1', '#ff2d55', '#ff9f43']];
        function parseHeroData(str) { return str.trim().split('\n').filter(line => line.trim() !== '').map(line => { const parts = line.split('\t').map(p => p.trim()); const roles = parts.slice(2).join(' ').split(',').map(r => r.trim().replace('---', '')).filter(r => r !== ''); return { name: parts[0], img: parts[1], roles: roles }; }); }
        const heroes = typeof rawData !== 'undefined' ? parseHeroData(rawData) : [];
        const roleTabs = ['ALL', 'TANK', 'FIGHTER', 'ASSASIN', 'MAGE', 'MARKSMAN', 'SUPPORT'];
        function renderPool(filterRole = 'ALL') { const poolZone = document.getElementById('pool-zone'); poolZone.innerHTML = ''; const usedNames = Array.from(document.querySelectorAll('#tier-list-container .hero-card .hero-name')).map(el => el.innerText.toUpperCase()); heroes.forEach(hero => { if ((filterRole === 'ALL' || hero.roles.includes(filterRole)) && !usedNames.includes(hero.name.toUpperCase())) { const card = document.createElement('div'); card.className = 'hero-card'; card.draggable = true; card.innerHTML = `<img src="${hero.img}" alt="${hero.name}"><div class="hero-name">${hero.name}</div>`; poolZone.appendChild(card); } }); }
        function initLabel(label) {
            label.onclick = (e) => {
                e.stopPropagation();
                const currentText = label.innerText.trim();
                const currentBg = window.getComputedStyle(label).backgroundColor;
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `<div class="edit-modal"><div class="modal-main-content"><div class="preview-box"><div class="preview-inner-stroke"><input type="text" class="preview-label" id="modalInput" value="${currentText}" style="background: ${currentBg}"></div></div><div class="color-palette-container" id="paletteBox"></div></div><div class="modal-footer"><button class="modal-btn btn-confirm" id="confirmEdit">Confirm</button><button class="modal-btn btn-cancel" id="cancelEdit">Cancel</button></div></div>`;
                document.body.appendChild(overlay);

                const modalInput = overlay.querySelector('#modalInput');
                const paletteBox = overlay.querySelector('#paletteBox');
                let selectedColor = currentBg;

                // ฟังก์ชันช่วยคำนวณความสว่างสี
                const getBrightness = (color) => {
                    const rgb = color.startsWith('#') 
                        ? [parseInt(color.slice(1, 3), 16), parseInt(color.slice(3, 5), 16), parseInt(color.slice(5, 7), 16)] 
                        : color.match(/\d+/g).map(Number);
                    return (rgb[0] * 299 + rgb[1] * 587 + rgb[2] * 114) / 1000;
                };

                // ตั้งค่าสีตัวอักษรเริ่มต้นใน Modal
                modalInput.style.color = getBrightness(currentBg) > 128 ? '#000' : '#fff';

                colorPaletteRows.forEach(row => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'color-row';
                    row.forEach(color => {
                        const circle = document.createElement('div');
                        circle.className = 'color-circle';
                        circle.style.background = color;
                        circle.onclick = () => {
                            selectedColor = color;
                            modalInput.style.background = color;
                            modalInput.style.color = getBrightness(color) > 128 ? '#000' : '#fff';
                        };
                        rowDiv.appendChild(circle);
                    });
                    paletteBox.appendChild(rowDiv);
                });

                overlay.querySelector('#confirmEdit').onclick = () => {
                    const newText = modalInput.value.toUpperCase() || currentText.toUpperCase();
                    label.innerText = newText;
                    label.style.background = selectedColor;
                    
                    // ปรับสีฟอนต์ตามความสว่าง
                    label.style.color = getBrightness(selectedColor) > 128 ? '#000' : '#fff';
                    
                    // ปรับสีเรืองแสง (Box Shadow) ให้เป็นสีเดียวกับเทียร์
                    label.style.setProperty('--label-shadow', selectedColor);
                    
                    document.body.removeChild(overlay);
                };

                overlay.querySelector('#cancelEdit').onclick = () => document.body.removeChild(overlay);
                modalInput.focus();
                modalInput.select();
            };
        }
        document.addEventListener('dragstart', e => { if (e.target.classList.contains('hero-card')) e.target.classList.add('dragging'); if (e.target.classList.contains('tier-row')) e.target.classList.add('dragging-row'); });
        document.addEventListener('dragend', e => { e.target.classList.remove('dragging'); e.target.classList.remove('dragging-row'); const activeTab = document.querySelector('.filter-tab.active'); renderPool(activeTab ? activeTab.innerText : 'ALL'); });
        document.addEventListener('dragover', e => { e.preventDefault(); const draggingCard = document.querySelector('.hero-card.dragging'); const draggingRow = document.querySelector('.dragging-row'); const zone = e.target.closest('.drop-zone'); const container = e.target.closest('#tier-list-container'); if (draggingCard && zone) { const afterElement = getAfterElement(zone, e.clientX, e.clientY); if (!afterElement) zone.appendChild(draggingCard); else zone.insertBefore(draggingCard, afterElement); } if (draggingRow && container) { const afterRow = getAfterRow(container, e.clientY); const btn = container.querySelector('.add-row-btn'); if (!afterRow) container.insertBefore(draggingRow, btn); else container.insertBefore(draggingRow, afterRow); } });
        function getAfterElement(zone, x, y) { const cards = [...zone.querySelectorAll('.hero-card:not(.dragging)')]; return cards.reduce((closest, child) => { const box = child.getBoundingClientRect(); const offsetX = x - box.left - box.width / 2; const offsetY = y - box.top - box.height / 2; if (offsetX < 0 && offsetY < box.height / 2 && offsetX > closest.offset) return { offset: offsetX, element: child }; return closest; }, { offset: -Infinity }).element; }
        function getAfterRow(container, y) { const rows = [...container.querySelectorAll('.tier-row:not(.dragging-row)')]; return rows.reduce((closest, child) => { const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2; if (offset < 0 && offset > closest.offset) return { offset, element: child }; return closest; }, { offset: -Infinity }).element; }
        document.querySelector('.add-row-btn').onclick = () => {
            const row = document.createElement('div');
            row.className = 'tier-row';
            row.draggable = true;
            // เพิ่มปุ่มลบ (delete-row-btn) เข้าไปใน HTML
            row.innerHTML = `
                <div class="delete-row-btn">-</div>
                <div class="tier-label" style="background:#666">NEW</div>
                <div class="drop-zone"></div>
            `;
            
            document.getElementById('tier-list-container').insertBefore(row, document.querySelector('.add-row-btn'));
            
            // ผูกฟังก์ชันลบแถว
            row.querySelector('.delete-row-btn').onclick = () => {
                const zone = row.querySelector('.drop-zone');
                const pool = document.getElementById('pool-zone');
                // ย้ายฮีโร่กลับไปที่ Pool ก่อนลบแถว
                while (zone.firstChild) {
                    pool.appendChild(zone.firstChild);
                }
                row.remove();
                renderPool(document.querySelector('.filter-tab.active').innerText);
            };
            
            initLabel(row.querySelector('.tier-label'));
        };
        function initFilters() { const bar = document.getElementById('filter-bar'); roleTabs.forEach(role => { const btn = document.createElement('button'); btn.className = `filter-tab ${role === 'ALL' ? 'active' : ''}`; btn.innerText = role; btn.onclick = () => { document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderPool(role); }; bar.appendChild(btn); }); }
        document.querySelectorAll('.tier-label').forEach(initLabel);
        document.querySelectorAll('.tier-row').forEach(r => r.draggable = true);
        initFilters();
        renderPool();
    </script>
</body>
</html>
